ktor {
  application {
    modules = [ com.yourcompany.zeiterfassung.ApplicationKt.module ]
  }

  deployment {
    host = "0.0.0.0"
    port = 8080
    port = ${?PORT}
  }

  database {
    driver          = "org.postgresql.Driver"
    # Local dev default URL (no secrets here). For prod, override via env below.
    url             = "jdbc:postgresql://localhost:5432/attendance"
    maximumPoolSize = 10

    # --- overrides via env ---
    # Base env vars are used for prod/default runtime.
    # *_NEON vars are allowed to override them for local testing against Neon.
    url             = ${?JDBC_DATABASE_URL}
    user            = ${?DB_USER}
    password        = ${?DB_PASSWORD}
    maximumPoolSize = ${?DB_MAX_POOL}

    url             = ${?JDBC_DATABASE_URL_NEON}
    user            = ${?DB_USER_NEON}
    password        = ${?DB_PASSWORD_NEON}
    maximumPoolSize = ${?DB_MAX_POOL_NEON}
  }

  jwt {
    # --- safe dev defaults; production overrides via env ---
    secret   = "dev-secret"
    issuer   = "dev-issuer"
    audience = "dev-audience"
    realm    = "zeiterfassung"
    validityMs = 3600000

    secret   = ${?JWT_SECRET}
    issuer   = ${?JWT_ISSUER}
    audience = ${?JWT_AUDIENCE}
    realm    = ${?JWT_REALM}
  }
}

twilio {
  # safe dev defaults; override via env in prod
  accountSid = "dev"
  authToken  = "dev"
  fromNumber = "+10000000000"

  accountSid = ${?TWILIO_SID}
  authToken  = ${?TWILIO_TOKEN}
  fromNumber = ${?TWILIO_PHONE_NUMBER}
}

cache {
  verificationCode {
    expireMinutes = 5
  }
}
